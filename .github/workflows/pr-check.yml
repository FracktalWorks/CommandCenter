# CommandCenter — PR validation (lint + test only, no deploy).
#
# Runs on every PR to main.  Fast feedback loop — catches regressions
# before they land.  The full deploy workflow runs only on merge to main.

name: pr-check

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "ai-company-brain/**"

permissions:
  contents: read

jobs:
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync

      # Blocking: CORRECTNESS-ONLY gate. These rules catch real bugs, not style
      # (F821 undefined-name, F601/F602 repeated dict keys, F502+ format errors,
      # F7 syntax-level issues, B006 mutable default arg). The repo's pre-existing
      # correctness violations were fixed in the accompanying 'fix:' commit, so
      # this passes today and blocks any NEW real bug from merging.
      # NOTE: F811 (redefinition) is deliberately EXCLUDED — it has a pre-existing
      # nested-scope violation in executor.py that needs careful manual handling,
      # tracked in the ratchet plan rather than force-fixed here.
      # Rationale for report-only style: the full ruff check has ~1.3k legacy
      # STYLE findings that are NOT auto-swept — a blanket `ruff --fix` deleted
      # intentional re-exports (see the spec), so style is ratcheted down by hand.
      - name: Ruff correctness (blocking)
        run: uv run ruff check . --select F821,F601,F602,F502,F7,B006

      # Non-blocking report: the FULL ruff check (all configured rules incl. the
      # ~1.3k-finding style backlog + C901 complexity hotspots). This is the
      # ratchet dashboard — the number should trend down; rules graduate to the
      # blocking gate above as each class is cleaned. Ratchet plan + backlog:
      # ai-company-brain/specs/dev_velocity_tooling_2026-07.md
      - name: Ruff full report (style backlog dashboard, non-blocking)
        continue-on-error: true
        run: uv run ruff check . || echo "style backlog above (non-blocking — see ratchet plan)"

      # Blocking: hard ceiling against NEW complexity. Thresholds are
      # grandfathered to current worst-case (abs=F covers cc=223) and the
      # repo-wide average is gated at B (current avg ≈ 6.9). A PR that pushes
      # the average worse, or adds a function worse than today's worst, fails.
      - name: Xenon complexity ceiling (blocking)
        run: uv run xenon --max-absolute F --max-modules F --max-average B apps packages

      # Non-blocking initially: mypy is strict in pyproject but the full repo
      # hasn't been swept. Report now; flip to blocking per the ratchet plan.
      - name: mypy strict (report-only)
        continue-on-error: true
        run: uv run mypy apps packages || echo "type errors above (non-blocking — tracked)"

      # Non-blocking: per-PR codebase-health on just the changed files, so a PR
      # that adds a big/complex function is visible in review before it merges.
      # The weekly whole-repo report is a separate scheduled workflow.
      - name: Codebase health (changed files, report-only)
        continue-on-error: true
        run: uv run python scripts/codebase_health.py --diff --top 10

  test:
    name: "Unit tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync

      - name: Run unit tests
        run: uv run python -m pytest tests/unit/ -x -v
