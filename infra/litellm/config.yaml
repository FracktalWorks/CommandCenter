# LiteLLM proxy config — ADR-008. Master key from $LITELLM_MASTER_KEY.
# Tier names MUST match acb_llm.client._TIER_MODEL.
#
# Dev routing: Gemini API via GEMINI_API_KEY (all tiers).
# Future: swap Tier 1 to vLLM/Qwen3 when a GPU host is added — tier names
# stay identical so acb_llm.client needs no changes.
model_list:
  # ---- Tier 1: fast classifier / triage (cheapest) ----
  # gemini-3.1-flash-lite: stable, frontier-class at fraction of cost (May 2026)
  - model_name: tier1-local-qwen3
    litellm_params:
      model: gemini/gemini-3.1-flash-lite
      api_key: os.environ/GEMINI_API_KEY
  # Future (when GPU host is available — swap above for this):
  # - model_name: tier1-local-qwen3
  #   litellm_params:
  #     model: openai/Qwen/Qwen3-8B-Instruct
  #     api_base: os.environ/VLLM_BASE_URL          # http://host.docker.internal:8001/v1
  #     api_key: "EMPTY"

  # ---- Tier 2: structured extraction / drafting ----
  # gemini-2.5-flash: stable, best price-performance for high-volume reasoning
  # reasoning_effort: "none" disables thinking tokens (budget_tokens=0,
  # includeThoughts=false) — prevents the Vercel AI SDK text-part ID mismatch
  # crash ("text part X not found") that occurs when thinking tokens stream
  # through the @ai-sdk/openai-compatible provider in CopilotKit's BuiltInAgent.
  - model_name: tier2-sonnet
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      reasoning_effort: "none"

  # ---- Tier 3: multi-hop reasoning / strategy / agentic orchestration ----
  # gemini-3.5-flash: stable, most intelligent model for agentic tasks (May 2026)
  - model_name: tier3-opus
    litellm_params:
      model: gemini/gemini-3.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # ---- Embeddings (used by the redis-semantic cache, WBS 1.8) ----
  # gemini-embedding-2: multimodal embedding model (text/image/video/audio/PDF)
  - model_name: text-embedding-3-small
    litellm_params:
      model: gemini/gemini-embedding-2
      api_key: os.environ/GEMINI_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  # Phase 1 (WBS 1.8): semantic cache. Equivalent prompts hit the cache even
  # if punctuation / casing / wording differs slightly. Requires Redis Stack
  # (already configured in docker-compose.yml) and an embedding model defined
  # in the model_list above.
  cache_params:
    type: redis
    url: redis://redis:6379
    # Phase 1 (WBS 1.8): upgrade to redis-semantic once a standalone embedding
    # sidecar is available (avoids startup chicken-and-egg with the proxy itself).
    # similarity_threshold: 0.85
    # redis_semantic_cache_embedding_model: text-embedding-3-small
  # Anthropic + OpenAI prompt caching is on by default per ADR-008.

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # database_url intentionally omitted — pure-proxy mode (see docker-compose.yml).
