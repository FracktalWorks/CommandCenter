description: email_classify golden cases
providers:
  - id: file://../../../evals/_runner.py
    label: acb-tier1
prompts:
  - "{{email_id}}"
tests:
  - vars: { email_id: "00000000-0000-0000-0000-000000000050" }
    assert:
      - type: contains-json
      - type: javascript
        value: |
          const r = JSON.parse(output);
          const VALID = ['sales_lead','sales_followup','delivery_issue','hr_query','finance','internal','spam','unknown'];
          return VALID.includes(r.label);
  - vars: { email_id: "00000000-0000-0000-0000-000000000051" }
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).confidence >= 0 && JSON.parse(output).confidence <= 1"
      - type: contains
        value: "[message:"