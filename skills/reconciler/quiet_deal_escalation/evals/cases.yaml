description: quiet_deal_escalation golden cases
providers:
  - id: file://../../../../evals/_runner.py
    label: acb-tier1
prompts:
  - "{{deal_id}} {{days_quiet}}"
tests:
  - vars: { deal_id: "00000000-0000-0000-0000-000000000080", days_quiet: 10 }
    assert:
      - type: contains
        value: "[deal:"
      - type: contains
        value: "low"
  - vars: { deal_id: "00000000-0000-0000-0000-000000000081", days_quiet: 50 }
    assert:
      - type: contains
        value: "[deal:"
      - type: contains
        value: "high"