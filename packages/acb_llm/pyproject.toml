[project]
name = "acb-llm"
version = "0.0.1"
description = "LiteLLM client + tiered routing helper + Langfuse hooks + guardrails."
requires-python = ">=3.12,<3.14"
dependencies = [
    "litellm>=1.52",
    "langfuse>=2.50",
    "tenacity>=9.0",
    "acb-common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["acb_llm"]
