[project]
name = "acb-graph"
version = "0.0.1"
description = "Postgres + pgvector + Apache AGE access layer."
requires-python = ">=3.12,<3.14"
dependencies = [
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.2",
    "pgvector>=0.3",
    "alembic>=1.13",
    "acb-common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["acb_graph"]
