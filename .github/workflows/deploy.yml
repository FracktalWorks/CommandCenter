# CommandCenter — CI/CD pipeline for Hostinger VPS deployment.
#
# Trigger: push to main (after PR merge) or manual dispatch.
# Flow:    lint → test → SSH to VPS → git pull → docker compose up →
#          uv sync → restart gateway → rebuild workbench → reload Caddy.
#
# Required GitHub Secrets (set in repo Settings → Secrets and variables → Actions):
#   HOSTINGER_HOST       — VPS IP or hostname (e.g. 123.45.67.89)
#   HOSTINGER_USER       — SSH user (e.g. acb)
#   HOSTINGER_SSH_KEY    — SSH private key (ed25519 or rsa)
#   HOSTINGER_APP_DIR    — app root on VPS (default /opt/acb/app)
#
# Optional:
#   GATEWAY_INTERNAL_TOKEN — if set, injects into .env on deploy
#   LITELLM_MASTER_KEY     — for infra smoke test

name: deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "ai-company-brain/**"
      - "skills/**"
      - "workbench/e2e/**"
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip test suite (use only for emergency hotfixes)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ── Gate 1: Lint + Type Check ──────────────────────────────────────────
  lint:
    name: "Lint & type-check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync

      - name: Ruff lint (info-only, not blocking)
        continue-on-error: true
        run: uv run ruff check . || echo "ruff found issues (non-blocking — see log)"

      - name: Mypy (info-only, not blocking)
        continue-on-error: true
        run: uv run mypy apps packages --ignore-missing-imports || echo "mypy found issues"

  # ── Gate 2: Unit Tests ─────────────────────────────────────────────────
  test:
    name: "Unit tests"
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync

      - name: Run unit tests
        run: uv run python -m pytest tests/unit/ -x -v

  # ── Gate 3: Build & Deploy to Hostinger ────────────────────────────────
  deploy:
    name: "Deploy to Hostinger"
    runs-on: ubuntu-latest
    needs: test
    if: success()
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          # Absorb intermittent runner↔VPS network blips: allow a long TCP
          # handshake window and let the command run up to 15 min. The
          # outer 'retries' on the step (below) re-attempts the whole SSH
          # connection if the initial dial still times out.
          timeout: 60s
          command_timeout: 15m
          script: |
            set -e
            APP_DIR="${APP_DIR:-/opt/acb/app}"
            cd "$APP_DIR"

            echo "==> Pulling latest from origin/main"
            # Preserve runtime-managed state that lives in tracked files but is
            # mutated on the VPS (agents.json = Control-Plane agent registry).
            # git reset --hard would otherwise wipe agents registered via the UI.
            cp apps/gateway/agents.json /tmp/acb-agents.json.bak 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main
            if [ -s /tmp/acb-agents.json.bak ]; then
              cp /tmp/acb-agents.json.bak apps/gateway/agents.json
              echo "    restored runtime agents.json ($(wc -l < apps/gateway/agents.json) lines)"
            fi

            echo "==> Skipping deprecated LiteLLM proxy cleanup (already removed)"

            echo "==> Ensuring memory-layer env vars in .env"
            ENV_FILE="/opt/acb/app/.env"
            for _var in MEM0_ENABLED GRAPHITI_ENABLED NEO4J_URL NEO4J_USER NEO4J_PASSWORD; do
              if ! grep -qE "^${_var}=" "$ENV_FILE" 2>/dev/null; then
                case "$_var" in
                  MEM0_ENABLED)       echo "MEM0_ENABLED=true" >> "$ENV_FILE" ;;
                  GRAPHITI_ENABLED)   echo "GRAPHITI_ENABLED=true" >> "$ENV_FILE" ;;
                  NEO4J_URL)          echo "NEO4J_URL=bolt://localhost:7687" >> "$ENV_FILE" ;;
                  NEO4J_USER)         echo "NEO4J_USER=neo4j" >> "$ENV_FILE" ;;
                  NEO4J_PASSWORD)     echo "NEO4J_PASSWORD=neo4j_dev_change_me" >> "$ENV_FILE" ;;
                esac
                echo "    + added $_var to .env"
              fi
            done

            echo "==> Bootstrapping Docker Compose stack (core + memory)"
            docker compose -f infra/docker-compose.yml --profile core --profile memory up -d --remove-orphans

            echo "==> Waiting for healthchecks (up to 90s)"
            deadline=$(( $(date +%s) + 90 ))
            while [ $(date +%s) -lt $deadline ]; do
              unhealthy=$(docker ps --filter "label=com.docker.compose.project=acb" --format '{{.Names}}\t{{.Status}}' \
                | awk '$0 ~ /unhealthy|starting/ {print $1}')
              if [ -z "$unhealthy" ]; then break; fi
              sleep 3
            done
            docker ps --filter "label=com.docker.compose.project=acb" --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

            echo "==> Syncing Python deps"
            if ! command -v uv >/dev/null; then
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.local/bin:$PATH"
            fi
            uv sync

            echo "==> Restarting gateway (systemd)"
            sudo systemctl restart acb-gateway
            sleep 3
            systemctl is-active --quiet acb-gateway || { echo "GATEWAY FAILED TO START"; exit 1; }
            echo "Gateway is active"

            echo "==> Rebuilding + restarting workbench (Next.js)"
            cd "$APP_DIR/workbench/control_plane"
            if [ -f package-lock.json ] || [ -f package.json ]; then
              npm ci --prefer-offline 2>/dev/null || npm install
              npm run build
            fi
            sudo systemctl restart acb-workbench
            sleep 3
            systemctl is-active --quiet acb-workbench || { echo "WORKBENCH FAILED TO START"; exit 1; }
            echo "Workbench is active"

            echo "==> Reloading Caddy"
            sudo systemctl reload caddy || true

            echo "==> Running infra health probe"
            cd "$APP_DIR"
            uv run python scripts/check_infra.py || {
              echo "INFRA PROBE FAILED — check logs: docker compose -f infra/docker-compose.yml logs --tail=100"
              exit 1
            }

            echo "==> Deployment complete"

  # ── Post-deploy: Smoke test (hit /health endpoint) ─────────────────────
  smoke:
    name: "Smoke test"
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - name: Health check
        run: |
          GATEWAY_URL="${GATEWAY_URL:-https://api.commandcenter.fracktal.in}"
          echo "Hitting $GATEWAY_URL/health (with retries for cold start)..."
          # Services may still be warming up right after deploy (systemd
          # restart + Next.js rebuild). Retry for up to ~60s before failing.
          for attempt in $(seq 1 12); do
            if curl -fsS --max-time 10 "$GATEWAY_URL/health"; then
              echo ""
              echo "Gateway is healthy (attempt $attempt)"
              exit 0
            fi
            echo "attempt $attempt/12 failed — retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 12 attempts (~60s)"
          exit 1
