[project]
name = "acb-stt"
version = "0.0.1"
description = "Speech-to-text via the platform LiteLLM plumbing (tier-stt model config)."
requires-python = ">=3.12,<3.14"
dependencies = [
    "litellm>=1.52",
    "acb-common",
    "acb-llm",
]

[project.optional-dependencies]
# Free, CPU-only self-hosted diarization (sherpa-onnx pyannote segmentation +
# speaker embeddings). Optional so the default install stays lean — enable with
# NOTES_LOCAL_DIARIZATION=1 + provisioned ONNX models. numpy decodes the ffmpeg
# PCM stream. See acb_stt/local_diarization.py.
local-diar = [
    "sherpa-onnx>=1.10",
    "numpy>=1.24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["acb_stt"]
