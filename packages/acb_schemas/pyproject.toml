[project]
name = "acb-schemas"
version = "0.0.1"
description = "Pydantic models for the entity graph (PERSON, TASK, DEAL, ...)."
requires-python = ">=3.12,<3.14"
dependencies = [
    "pydantic[email]>=2.9",
    "acb-common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["acb_schemas"]
