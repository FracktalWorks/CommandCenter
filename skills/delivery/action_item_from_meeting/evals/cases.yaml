description: action_item_from_meeting golden cases
providers:
  - id: file://../../../evals/_runner.py
    label: acb-tier2
prompts:
  - "{{transcript_id}}"
tests:
  - vars: { transcript_id: "00000000-0000-0000-0000-000000000020" }
    assert:
      - type: contains-json
      - type: javascript
        value: "Array.isArray(JSON.parse(output))"
      - type: contains
        value: "[meeting:"
  - vars: { transcript_id: "00000000-0000-0000-0000-000000000021" }
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).every(i => 'title' in i && 'cite' in i)"