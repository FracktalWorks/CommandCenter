[project]
name = "acb-auth"
version = "0.0.1"
description = "RBAC roles, user context, and FastAPI dependency helpers (WBS 1.7)."
requires-python = ">=3.12,<3.14"
dependencies = [
    "fastapi>=0.115",
    "acb-common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["acb_auth"]

