description: entity_link golden cases
providers:
  - id: file://../../../evals/_runner.py
    label: acb-tier1
prompts:
  - "{{email_id}} {{label}}"
tests:
  - vars: { email_id: "00000000-0000-0000-0000-000000000060", label: "sales_followup" }
    assert:
      - type: contains-json
      - type: javascript
        value: "Array.isArray(JSON.parse(output).linked_entities)"
      - type: contains
        value: "[message:"
  - vars: { email_id: "00000000-0000-0000-0000-000000000061", label: "delivery_issue" }
    assert:
      - type: contains-json
      - type: javascript
        value: "JSON.parse(output).linked_entities.every(e => e.confidence >= 0)"