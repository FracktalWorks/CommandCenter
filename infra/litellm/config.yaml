# LiteLLM model list — used by the Control Plane Settings UI to manage
# tier→model assignments.  Since we use the litellm SDK directly (no proxy),
# the router_settings / general_settings sections are no longer needed.
#
# Tier entries (tier1-*, tier2-*, tier3-*) map to the three quality tiers.
# Non-tier entries are available models shown in the provider model picker.

model_list:
  # ── Tier assignments ────────────────────────────────────────────────────
  - model_name: tier1-local-qwen3
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
  - model_name: tier2-sonnet
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
  - model_name: tier3-opus
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  # ── Copilot entries (github/… prefix for BYOK routing) ──────────────────
  - model_name: copilot/gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_TOKEN
      extra_headers:
        Copilot-Integration-Id: vscode-chat
  - model_name: copilot/gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_TOKEN
      extra_headers:
        Copilot-Integration-Id: vscode-chat
  - model_name: copilot/claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_TOKEN
      extra_headers:
        Copilot-Integration-Id: vscode-chat
  - model_name: copilot/o3-mini
    litellm_params:
      model: openai/o3-mini
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_TOKEN
      extra_headers:
        Copilot-Integration-Id: vscode-chat

  # ── Direct provider entries ─────────────────────────────────────────────
  - model_name: anthropic/claude-sonnet-4-5
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: anthropic/claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
