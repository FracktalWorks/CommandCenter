router_settings:
  fallbacks:
  - tier1-local-qwen3:
    - copilot/gpt-4o-mini
  - tier2-sonnet:
    - copilot/gpt-4o
  - tier3-opus:
    - copilot/o3-mini
litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    url: redis://redis:6379
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  ui_username: os.environ/UI_USERNAME
  ui_password: os.environ/UI_PASSWORD
