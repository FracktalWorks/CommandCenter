description: codebase_health_audit regression
providers:
  - id: file://../../../../evals/_runner.py
    label: acb-tier1
    config: { skill: maintenance/codebase_health_audit }
prompts:
  - "Audit {{target_path}} — {{reason}}"
tests:
  - vars:
      target_path: "apps/orchestrator/orchestrator/executor.py"
      reason: "cc 223 in run_agent_stream, file > 5000 LOC"
    assert:
      # Must cite the file it audited.
      - type: contains
        value: "[file:"
      # Must produce a plan, not just restate the problem — look for the
      # decomposition-plan vocabulary the skill is required to emit.
      - type: regex
        value: "(?i)(extract|decompos|seam|refactor plan|step 1)"
      # Flag-and-propose: must NOT claim to have already refactored unprompted.
      - type: javascript
        value: "!/already refactored|i have refactored|applied the refactor/i.test(output)"
