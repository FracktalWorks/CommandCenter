# AI Company Brain — Docker Compose stack.
# Same file works for local dev (Windows / Mac via Docker Desktop) and the
# Hostinger KVM 4 VPS (Ubuntu 24.04 + Docker). Compose profiles let you start
# lean and add Langfuse later:
#
#   Lean (Phase 0 minimum):  docker compose --profile core up -d
#   Full  (with observability): docker compose --profile core --profile obs up -d
#
# AGE (Apache property-graph) is deferred to Phase 2 — Phase 0 only needs
# pgvector + relational tables. See ai-company-brain/system_architecture.md §4.

name: acb

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: acb-postgres
    <<: *restart
    profiles: ["core", "obs"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acb_dev_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-acb}
    ports:
      - "5432:5432"
    volumes:
      - acb-postgres-data:/var/lib/postgresql/data
      - ./postgres/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-acb} -d $${POSTGRES_DB:-acb}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: acb-redis
    <<: *restart
    profiles: ["core", "obs"]
    ports:
      - "6379:6379"
    volumes:
      - acb-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: acb-litellm
    <<: *restart
    profiles: ["core", "obs"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-dev-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      GEMINI_API_KEY:    ${GEMINI_API_KEY:-}
      # NOTE: intentionally no DATABASE_URL. Pointing LiteLLM at Postgres
      # triggers ~110 Prisma migrations on first boot (~9 minutes) and is only
      # needed for virtual-keys / built-in spend-logs. We rely on Langfuse for
      # observability, so pure-proxy mode is the right tradeoff for Phase 0.
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://host.docker.internal:8001/v1}
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    extra_hosts:
      # Lets the proxy reach a vLLM running on the host (Linux + Docker Desktop).
      - "host.docker.internal:host-gateway"
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:4000/health/readiness',timeout=2); sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # --- Langfuse (self-hosted observability). Opt-in via `--profile obs`. ---
  langfuse:
    image: langfuse/langfuse:2
    container_name: acb-langfuse
    <<: *restart
    profiles: ["obs"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-acb}:${POSTGRES_PASSWORD:-acb_dev_change_me}@postgres:5432/${POSTGRES_DB:-acb}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-dev-langfuse-secret-change-me}
      SALT:            ${LANGFUSE_SALT:-dev-langfuse-salt}
      NEXTAUTH_URL:    ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3000}
      TELEMETRY_ENABLED: "false"
    ports:
      - "3000:3000"

volumes:
  acb-postgres-data:
  acb-redis-data:
