description: deal_followup_draft golden cases
providers:
  - id: file://../../../evals/_runner.py
    label: acb-tier2
prompts:
  - "{{deal_id}}"
tests:
  - vars: { deal_id: "00000000-0000-0000-0000-000000000040" }
    assert:
      - type: contains
        value: "[deal:"
      - type: javascript
        value: "output.split(' ').length <= 160"
      - type: not-contains
        value: "pipeline_inr"
  - vars: { deal_id: "00000000-0000-0000-0000-000000000041" }
    assert:
      - type: contains
        value: "subject:"
      - type: contains
        value: "[deal:"