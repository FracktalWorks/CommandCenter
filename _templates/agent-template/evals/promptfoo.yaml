description: "{{ agent_name }} — LLM eval suite"
providers:
  - id: litellm
    config:
      # Uses LITELLM_BASE_URL + LITELLM_API_KEY from environment
      model: gpt-4o-mini

prompts:
  - "{{ event_payload }}"

tests:
  - description: "Happy path — valid payload returns a result"
    vars:
      event_payload: '{"test_key": "test_value"}'
    assert:
      - type: javascript
        value: "output.result !== null && output.result !== undefined"

  - description: "Empty payload is handled gracefully"
    vars:
      event_payload: "{}"
    assert:
      - type: javascript
        value: "output.error === null || output.error === undefined"
