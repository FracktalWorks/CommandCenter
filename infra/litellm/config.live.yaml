model_list:
# --- Tier aliases (orchestrator + chat default uses these) ---
- model_name: tier1-local-qwen3
  litellm_params:
    model: deepseek/deepseek-chat
    api_key: os.environ/DEEPSEEK_API_KEY
- model_name: tier2-sonnet
  litellm_params:
    model: deepseek/deepseek-chat
    api_key: os.environ/DEEPSEEK_API_KEY
- model_name: tier3-opus
  litellm_params:
    model: deepseek/deepseek-reasoner
    api_key: os.environ/DEEPSEEK_API_KEY
# --- DeepSeek (direct) ---
- model_name: deepseek/deepseek-chat
  litellm_params:
    model: deepseek/deepseek-chat
    api_key: os.environ/DEEPSEEK_API_KEY
- model_name: deepseek/deepseek-reasoner
  litellm_params:
    model: deepseek/deepseek-reasoner
    api_key: os.environ/DEEPSEEK_API_KEY
# --- DeepSeek v4 (via OpenRouter) ---
- model_name: deepseek/deepseek-v4-pro
  litellm_params:
    model: openrouter/deepseek/deepseek-v4-pro
    api_key: os.environ/OPENROUTER_API_KEY
    api_base: https://openrouter.ai/api/v1
- model_name: deepseek/deepseek-v4-flash
  litellm_params:
    model: openrouter/deepseek/deepseek-v4-flash
    api_key: os.environ/OPENROUTER_API_KEY
    api_base: https://openrouter.ai/api/v1
# --- Groq (free tier) ---
- model_name: groq/llama-3.3-70b
  litellm_params:
    model: groq/llama-3.3-70b-versatile
    api_key: os.environ/GROQ_API_KEY
- model_name: groq/llama-3.1-8b
  litellm_params:
    model: groq/llama-3.1-8b-instant
    api_key: os.environ/GROQ_API_KEY
# --- Gemini ---
- model_name: gemini/gemini-2.5-flash
  litellm_params:
    model: gemini/gemini-2.5-flash
    api_key: os.environ/GEMINI_API_KEY
- model_name: gemini/gemini-2.5-pro
  litellm_params:
    model: gemini/gemini-2.5-pro
    api_key: os.environ/GEMINI_API_KEY
# --- GitHub Copilot ---
- model_name: copilot/gpt-4o
  litellm_params:
    model: openai/gpt-4o
    api_base: https://api.githubcopilot.com
    api_key: os.environ/GITHUB_TOKEN
    extra_headers:
      Copilot-Integration-Id: vscode-chat
- model_name: copilot/claude-sonnet
  litellm_params:
    model: anthropic/claude-sonnet-4-5
    api_base: https://api.githubcopilot.com
    api_key: os.environ/GITHUB_TOKEN
    extra_headers:
      Copilot-Integration-Id: vscode-chat

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
