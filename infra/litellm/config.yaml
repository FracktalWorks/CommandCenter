# LiteLLM proxy config — ADR-008. Master key from $LITELLM_MASTER_KEY.
# Tier names MUST match acb_llm.client._TIER_MODEL.

# Tier names MUST match acb_llm.client._TIER_MODEL.
#
# Phase 0 default routing — uses ONLY hosted models, no GPU required. This
# works identically on the Windows dev box and on a Hostinger KVM-4 VPS.
#
# When a GPU host is added later, point `tier1-local-qwen3` at the vLLM URL
# (uncomment the second block and remove the Haiku fallback). The acb_llm
# client stays unchanged.
model_list:
  # ---- Tier 1: cheap, fast classifier / triage ----
  # TEMP (Phase 0 testing): Gemini key only. Swap back to Anthropic / vLLM
  # once those keys land — the tier *names* (tier1-local-qwen3, tier2-sonnet,
  # tier3-opus) must stay identical because acb_llm.client._TIER_MODEL pins them.
  - model_name: tier1-local-qwen3
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GEMINI_API_KEY
  # Original Anthropic route (re-enable when ANTHROPIC_API_KEY is set):
  # - model_name: tier1-local-qwen3
  #   litellm_params:
  #     model: anthropic/claude-3-5-haiku-latest
  #     api_key: os.environ/ANTHROPIC_API_KEY
  # When vLLM is available, swap the above for:
  # - model_name: tier1-local-qwen3
  #   litellm_params:
  #     model: openai/Qwen/Qwen3-8B-Instruct
  #     api_base: os.environ/VLLM_BASE_URL          # http://host.docker.internal:8001/v1
  #     api_key: "EMPTY"

  # ---- Tier 2: structured extraction / drafting ----
  - model_name: tier2-sonnet
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
  # - model_name: tier2-sonnet
  #   litellm_params:
  #     model: anthropic/claude-3-5-sonnet-latest
  #     api_key: os.environ/ANTHROPIC_API_KEY

  # ---- Tier 3: multi-hop reasoning / strategy ----
  - model_name: tier3-opus
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY
  # - model_name: tier3-opus
  #   litellm_params:
  #     model: anthropic/claude-3-opus-latest
  #     api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
  # Anthropic + OpenAI prompt caching is on by default per ADR-008.

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # database_url intentionally omitted — pure-proxy mode (see docker-compose.yml).
