# AI Company Brain — Docker Compose stack.
# Same file works for local dev (Windows / Mac via Docker Desktop) and the
# Hostinger KVM 4 VPS (Ubuntu 24.04 + Docker).
#
#   Start: docker compose --profile core up -d
#
# AGE (Apache property-graph) is deferred to Phase 2 — Phase 0 only needs
# pgvector + relational tables. See ai-company-brain/system_architecture.md §4.

name: acb

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: acb-postgres
    <<: *restart
    profiles: ["core"]
    mem_limit: 512m
    memswap_limit: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acb_dev_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-acb}
    ports:
      - "5432:5432"
    volumes:
      - acb-postgres-data:/var/lib/postgresql/data
      - ./postgres/00_create_databases.sql:/docker-entrypoint-initdb.d/00_create_databases.sql:ro
      - ./postgres/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-acb} -d $${POSTGRES_DB:-acb}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    # Vanilla Redis 7 is sufficient for Phase 0:
    #   - Redis Streams (event bus / webhook deduplication)
    #   - agent-framework-redis RedisHistoryProvider (conversation history per thread)
    #   - agent-framework-redis RedisContextProvider (persistent agent context)
    # Redis Stack (RediSearch + RedisJSON) is only needed if/when we enable
    # LiteLLM's redis-semantic cache backend — deferred to Phase 2 (WBS 1.8).
    image: redis:7-alpine
    container_name: acb-redis
    <<: *restart
    profiles: ["core"]
    mem_limit: 256m
    memswap_limit: 256m
    ports:
      - "6379:6379"
    volumes:
      - acb-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: acb-litellm
    <<: *restart
    profiles: ["core"]
    mem_limit: 2g
    memswap_limit: 2g
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-dev-change-me}
      # LiteLLM UI credentials — set a static user/pass so the UI opens without
      # a login prompt in local dev. Change these in prod via infra/.env.
      UI_USERNAME: ${LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD:-admin}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      GEMINI_API_KEY:    ${GEMINI_API_KEY:-}
      GITHUB_TOKEN:      ${GITHUB_TOKEN:-}
      GROQ_API_KEY:      ${GROQ_API_KEY:-}
      MISTRAL_API_KEY:   ${MISTRAL_API_KEY:-}
      TOGETHER_API_KEY:  ${TOGETHER_API_KEY:-}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://host.docker.internal:8001/v1}
      # DATABASE_URL enables the LiteLLM management UI at http://localhost:4000/ui
      # (virtual keys, spend tracking, model management). Prisma runs ~110 migrations
      # on first boot — expect ~5 min cold-start. Subsequent boots are fast.
      # Uses a DEDICATED litellm database to keep its Prisma schema isolated.
      DATABASE_URL: postgresql://${POSTGRES_USER:-acb}:${POSTGRES_PASSWORD:-acb_dev_change_me}@postgres:5432/litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    extra_hosts:
      # Lets the proxy reach a vLLM running on the host (Linux + Docker Desktop).
      - "host.docker.internal:host-gateway"
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:4000/health/readiness',timeout=2); sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # --- Copilot SDK mutation sandbox image. Build via `--profile sandbox`. ---
  # Not a long-running service — the image is built here so
  # `docker compose --profile sandbox build` produces acb-mutation-runner:latest.
  # The orchestrator spawns short-lived `docker run --rm -d` containers from
  # this image on demand; no persistent container is kept running.
  #
  # Auth (pass at least one):
  #   LITELLM_MASTER_KEY  — BYOK via local LiteLLM proxy (preferred)
  #   GITHUB_TOKEN        — standard Copilot subscription auth
  #
  # Build only: docker compose --profile sandbox build mutation
  mutation:
    build:
      context: ../apps/orchestrator
      dockerfile: Dockerfile.mutation
    image: acb-mutation-runner:latest
    profiles: ["sandbox"]
    # Override entrypoint so `docker compose up` is a no-op for this service.
    entrypoint: ["true"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  acb-postgres-data:
  acb-redis-data:
