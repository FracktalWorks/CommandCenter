[project]
name = "acb-stt"
version = "0.0.1"
description = "Speech-to-text via the platform LiteLLM plumbing (tier-stt model config)."
requires-python = ">=3.12,<3.14"
dependencies = [
    "litellm>=1.52",
    "acb-common",
    "acb-llm",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["acb_stt"]
