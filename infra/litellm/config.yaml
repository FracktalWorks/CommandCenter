# LLM model tier list — used by the Control Plane Settings UI and the
# gateway /v1 endpoint to map tier aliases → provider models.
# The gateway uses the litellm Python SDK directly (no proxy process).
#
# Tier entries (tier1-*, tier2-*, tier3-*) map to the three quality tiers.
# Non-tier entries are available models shown in the provider model picker.

model_list:
  # ── Tier assignments ────────────────────────────────────────────────────
  - model_name: tier-fast
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
  - model_name: tier-balanced
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
  - model_name: tier-powerful
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  # ── Copilot entries (github/… prefix for BYOK routing) ──────────────────
  - model_name: copilot/gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_TOKEN
      extra_headers:
        Copilot-Integration-Id: vscode-chat
  - model_name: copilot/gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_TOKEN
      extra_headers:
        Copilot-Integration-Id: vscode-chat
  - model_name: copilot/claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_TOKEN
      extra_headers:
        Copilot-Integration-Id: vscode-chat
  - model_name: copilot/o3-mini
    litellm_params:
      model: openai/o3-mini
      api_base: https://api.githubcopilot.com
      api_key: os.environ/GITHUB_TOKEN
      extra_headers:
        Copilot-Integration-Id: vscode-chat

  # ── Direct provider entries ─────────────────────────────────────────────
  - model_name: anthropic/claude-sonnet-4-5
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: anthropic/claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
