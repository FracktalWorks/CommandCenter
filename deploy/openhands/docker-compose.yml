# OpenHands self-host for CommandCenter Skill Workbench.
#
# Mounts:
#   - /var/run/docker.sock  -> required: OpenHands spawns a runtime container per session.
#   - ./openhands-state     -> persistent state (workspaces, settings, conversations).
#   - ../../skills          -> read-write mount so skills authored inside OpenHands land
#                              back in the repo on the host.
#
# LLM defaults point at our LiteLLM gateway (see infra/litellm). The user can still
# override via the OpenHands Settings UI on first run.
#
# Bring up:    docker compose -f deploy/openhands/docker-compose.yml --env-file .env up -d
# Tear down:   docker compose -f deploy/openhands/docker-compose.yml down
# Logs:        docker compose -f deploy/openhands/docker-compose.yml logs -f openhands

services:
  openhands:
    image: docker.all-hands.dev/all-hands-ai/openhands:${OPENHANDS_VERSION:-0.55}
    container_name: commandcenter-openhands
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${OPENHANDS_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Runtime image OpenHands launches per session.
      SANDBOX_RUNTIME_CONTAINER_IMAGE: docker.all-hands.dev/all-hands-ai/runtime:${OPENHANDS_VERSION:-0.55}-nikolaik
      LOG_ALL_EVENTS: "true"
      # LLM wiring -> LiteLLM gateway (litellm_proxy provider).
      # Set LITELLM_BASE_URL + LITELLM_MASTER_KEY in .env.
      LLM_BASE_URL: ${LITELLM_BASE_URL:-http://host.docker.internal:4000}
      LLM_API_KEY:  ${LITELLM_MASTER_KEY:-changeme}
      LLM_MODEL:    ${OPENHANDS_DEFAULT_MODEL:-litellm_proxy/tier2-gemini}
      # Optional Git PR flow (GH PAT scoped to the ai-company-brain repo).
      GITHUB_TOKEN: ${GITHUB_PAT:-}
      # Workspace mount the agent will see inside its sandbox.
      WORKSPACE_BASE: /opt/workspace_base
      SANDBOX_USER_ID: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./openhands-state:/.openhands
      - ../../skills:/opt/workspace_base/skills:rw
    networks:
      - commandcenter

networks:
  commandcenter:
    name: commandcenter_net
    external: false