# AI Company Brain — Docker Compose stack.
# Same file works for local dev (Windows / Mac via Docker Desktop) and the
# Hostinger KVM 4 VPS (Ubuntu 24.04 + Docker). Compose profiles let you start
# lean and add Langfuse later:
#
#   Lean (Phase 0 minimum):  docker compose --profile core up -d
#   Full  (with observability): docker compose --profile core --profile obs up -d
#
# AGE (Apache property-graph) is deferred to Phase 2 — Phase 0 only needs
# pgvector + relational tables. See ai-company-brain/system_architecture.md §4.

name: acb

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: acb-postgres
    <<: *restart
    profiles: ["core", "obs"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acb_dev_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-acb}
    ports:
      - "5432:5432"
    volumes:
      - acb-postgres-data:/var/lib/postgresql/data
      - ./postgres/00_create_databases.sql:/docker-entrypoint-initdb.d/00_create_databases.sql:ro
      - ./postgres/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-acb} -d $${POSTGRES_DB:-acb}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    # Vanilla Redis 7 is sufficient for Phase 0:
    #   - Redis Streams (event bus / webhook deduplication)
    #   - agent-framework-redis RedisHistoryProvider (conversation history per thread)
    #   - agent-framework-redis RedisContextProvider (persistent agent context)
    # Redis Stack (RediSearch + RedisJSON) is only needed if/when we enable
    # LiteLLM's redis-semantic cache backend — deferred to Phase 2 (WBS 1.8).
    image: redis:7-alpine
    container_name: acb-redis
    <<: *restart
    profiles: ["core", "obs"]
    ports:
      - "6379:6379"
    volumes:
      - acb-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- LLM routing — handled by litellm Python SDK directly (no proxy container). ---
  # Provider API keys are stored encrypted in Postgres (provider_keys table).
  # See packages/acb_llm/acb_llm/client.py and key_store.py.

  # --- Langfuse (self-hosted observability). Opt-in via `--profile obs`. ---
  langfuse:
    image: langfuse/langfuse:2
    container_name: acb-langfuse
    <<: *restart
    profiles: ["obs"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-acb}:${POSTGRES_PASSWORD:-acb_dev_change_me}@postgres:5432/${POSTGRES_DB:-acb}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-dev-langfuse-secret-change-me}
      SALT:            ${LANGFUSE_SALT:-dev-langfuse-salt}
      NEXTAUTH_URL:    ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3000}
      TELEMETRY_ENABLED: "false"
    ports:
      - "3000:3000"

  # --- Copilot SDK mutation sandbox image. Build via `--profile sandbox`. ---
  # Not a long-running service — the image is built here so
  # `docker compose --profile sandbox build` produces acb-mutation-runner:latest.
  # The orchestrator spawns short-lived `docker run --rm -d` containers from
  # this image on demand; no persistent container is kept running.
  #
  # Auth (pass at least one):
  #   LITELLM_MASTER_KEY  — BYOK via local LiteLLM proxy (preferred)
  #   GITHUB_TOKEN        — standard Copilot subscription auth
  #
  # Build only: docker compose --profile sandbox build mutation
  mutation:
    build:
      context: ../apps/orchestrator
      dockerfile: Dockerfile.mutation
    image: acb-mutation-runner:latest
    profiles: ["sandbox"]
    # Override entrypoint so `docker compose up` is a no-op for this service.
    entrypoint: ["true"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  acb-postgres-data:
  acb-redis-data:
