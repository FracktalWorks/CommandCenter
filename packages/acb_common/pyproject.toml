[project]
name = "acb-common"
version = "0.0.1"
description = "Shared settings, logging, OTel bootstrap."
requires-python = ">=3.12,<3.14"
dependencies = [
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "structlog>=24.4",
    "python-dotenv>=1.0",
    "opentelemetry-api>=1.28",
    "opentelemetry-sdk>=1.28",
    "redis>=5.2",
    "psycopg[binary]>=3.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["acb_common"]
