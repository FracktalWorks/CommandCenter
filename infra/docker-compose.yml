# AI Company Brain — Docker Compose stack.
# Same file works for local dev (Windows / Mac via Docker Desktop) and the
# Hostinger KVM 4 VPS (Ubuntu 24.04 + Docker). Compose profiles let you start
# lean and add Langfuse later:
#
#   Lean (Phase 0 minimum):  docker compose --profile core up -d
#   Full  (with observability): docker compose --profile core --profile obs up -d
#
# AGE (Apache property-graph) is deferred to Phase 2 — Phase 0 only needs
# pgvector + relational tables. See ai-company-brain/system_architecture.md §4.

name: acb

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: acb-postgres
    <<: *restart
    profiles: ["core", "obs"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acb_dev_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-acb}
    ports:
      - "5432:5432"
    volumes:
      - acb-postgres-data:/var/lib/postgresql/data
      - ./postgres/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-acb} -d $${POSTGRES_DB:-acb}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    # Phase 1 (WBS 1.8): upgraded from redis:7-alpine to redis-stack-server so
    # we get RediSearch + RedisJSON, which LiteLLM's `redis-semantic` cache
    # backend depends on. The vanilla Redis command set (used by everything
    # else: queues, rate-limits, locks) is unchanged.
    image: redis/redis-stack-server:7.4.0-v0
    container_name: acb-redis
    <<: *restart
    profiles: ["core", "obs"]
    ports:
      - "6379:6379"
    volumes:
      - acb-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: acb-litellm
    <<: *restart
    profiles: ["core", "obs"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local-dev-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      GEMINI_API_KEY:    ${GEMINI_API_KEY:-}
      # NOTE: intentionally no DATABASE_URL. Pointing LiteLLM at Postgres
      # triggers ~110 Prisma migrations on first boot (~9 minutes) and is only
      # needed for virtual-keys / built-in spend-logs. We rely on Langfuse for
      # observability, so pure-proxy mode is the right tradeoff for Phase 0.
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://host.docker.internal:8001/v1}
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    extra_hosts:
      # Lets the proxy reach a vLLM running on the host (Linux + Docker Desktop).
      - "host.docker.internal:host-gateway"
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:4000/health/readiness',timeout=2); sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # --- Langfuse (self-hosted observability). Opt-in via `--profile obs`. ---
  langfuse:
    image: langfuse/langfuse:2
    container_name: acb-langfuse
    <<: *restart
    profiles: ["obs"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-acb}:${POSTGRES_PASSWORD:-acb_dev_change_me}@postgres:5432/${POSTGRES_DB:-acb}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-dev-langfuse-secret-change-me}
      SALT:            ${LANGFUSE_SALT:-dev-langfuse-salt}
      NEXTAUTH_URL:    ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3000}
      TELEMETRY_ENABLED: "false"
    ports:
      - "3000:3000"

  # --- n8n workflow editor. Opt-in via `--profile workflows`. ---
  # Operators build cron / webhook flows here; we mirror them into Git via
  # scripts/n8n_export.py so workflows live alongside the rest of the repo.
  n8n:
    image: n8nio/n8n:latest
    container_name: acb-n8n
    <<: *restart
    profiles: ["workflows"]
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${TZ:-Asia/Kolkata}
      # n8n v2 uses account-based auth (UI-created owner + API key).
      # One-time first-run setup:
      #   1. Open http://localhost:5678, complete the setup wizard.
      #   2. Settings → n8n API → Create an API key.
      #   3. Add N8N_API_KEY=<key> to .env.
      # Allow embedding in our Next.js control plane iframe.
      N8N_SECURE_COOKIE: "false"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-dev-n8n-key-change-me-32chars-ok}
      # Keep the login session alive for 1 year in dev so users never re-auth.
      N8N_USER_MANAGEMENT_JWT_DURATION_HOURS: "8760"
      # Serve n8n from /n8n/ so it can be proxied through the Next.js control
      # plane (same-origin iframe) without browser cross-port restrictions.
      N8N_PATH: /n8n/
      # Use Server-Sent Events instead of WebSocket for push; SSE is proxiable
      # by Next.js rewrites (WebSocket upgrades are not).
      N8N_PUSH_BACKEND: sse
    ports:
      - "5678:5678"
    volumes:
      - acb-n8n-data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- OpenHands AI coding agent. Opt-in via `--profile sandbox`. ---
  # Runs the full OpenHands GUI at http://localhost:3002.
  # Uses port 3002 to avoid collision with Langfuse (obs profile, port 3000).
  #
  # Windows (Docker Desktop): /var/run/docker.sock is proxied transparently.
  # First run pulls ~2 GB (openhands image + runtime image); be patient.
  #
  # Configure your LLM via the OpenHands Settings UI on first launch.
  # To use the local LiteLLM proxy: set base_url = http://host.docker.internal:4000
  openhands:
    image: ghcr.io/all-hands-ai/openhands:0.59
    container_name: acb-openhands
    <<: *restart
    profiles: ["sandbox"]
    environment:
      # Image used for per-conversation sandboxes (Docker-in-Docker).
      # Must match the openhands image version — runtime:latest was Aug 2024
      # (miniforge3) but 0.59 expects micromamba; use the pinned runtime tag.
      SANDBOX_RUNTIME_CONTAINER_IMAGE: ghcr.io/all-hands-ai/runtime:0.59-nikolaik
      # Tell OpenHands which host port it's exposed on so sandbox webhook
      # callbacks (http://host.docker.internal:{port}/api/v1/webhooks) work.
      OH_SANDBOX_HOST_PORT: "3002"
      LOG_ALL_EVENTS: "true"
      # Pre-wire LLM to the local LiteLLM proxy (Gemini 2.5 Pro via tier3-opus)
      LLM_MODEL: "tier3-opus"
      LLM_BASE_URL: "http://host.docker.internal:4000"
      LLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-local-dev-change-me}
    ports:
      - "3002:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - acb-openhands-data:/.openhands
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  acb-postgres-data:
  acb-redis-data:
  acb-n8n-data:
  acb-openhands-data:
