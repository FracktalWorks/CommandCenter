# AI Company Brain -- Skill Eval Harness (WBS 1.9.1)
# Run:  npx promptfoo@latest eval --config evals/promptfoo.yaml
# CI:   .github/workflows/skill-eval.yml

description: "ACB skill regression suite -- golden cases for top-10 Phase 0/1 skills"

# Default provider: LiteLLM gateway proxying tier1 (Qwen3 / Gemini flash)
providers:
  - id: openai:tier1-local-qwen3
    config:
      apiBaseUrl: "${LITELLM_BASE_URL:-http://localhost:4000}/v1"
      apiKey: "${LITELLM_API_KEY:-sk-local-dev-change-me}"
      temperature: 0

# Default assertions that apply to every test unless overridden
defaultTest:
  assert:
    - type: javascript
      value: "output !== null && output.length > 0"
    - type: not-contains
      value: "[agent error]"

# Include per-skill case files (glob)
tests:
  - file://skills/delivery/stale_task_nudge/evals/cases.yaml
  - file://skills/delivery/project_status_summary/evals/cases.yaml
  - file://skills/delivery/action_item_from_meeting/evals/cases.yaml
  - file://skills/sales/quiet_deal_followup/evals/cases.yaml
  - file://skills/sales/customer_360_summary/evals/cases.yaml
  - file://skills/sales/deal_followup_draft/evals/cases.yaml
  - file://skills/triage/email_classify/evals/cases.yaml
  - file://skills/triage/entity_link/evals/cases.yaml
  - file://skills/reconciler/stale_task_escalation/evals/cases.yaml
  - file://skills/reconciler/quiet_deal_escalation/evals/cases.yaml

outputPath: evals/results.json