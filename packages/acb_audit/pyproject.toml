[project]
name = "acb-audit"
version = "0.0.1"
description = "Append-only audit log (input for the Annealer)."
requires-python = ">=3.12,<3.14"
dependencies = [
    "sqlalchemy>=2.0",
    "acb-common",
    "acb-graph",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["acb_audit"]
