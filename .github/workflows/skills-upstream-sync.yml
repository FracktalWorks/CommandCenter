# Weekly sync of upstream skill repositories into skills/upstream/.
# Opens a PR so maintainers can review diffs before adopting any skill.
name: skills-upstream-sync

on:
  schedule:
    - cron: "0 4 * * 1"   # every Monday 04:00 UTC
  workflow_dispatch:       # allow manual runs

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull anthropics/skills
        run: |
          tmp="$(mktemp -d)"
          git clone --depth 1 https://github.com/anthropics/skills "$tmp"
          rm -rf skills/upstream/anthropics
          mkdir -p skills/upstream/anthropics
          # Mirror only the actual skills tree, leave the rest behind.
          if [ -d "$tmp/skills" ]; then
            cp -r "$tmp/skills/." skills/upstream/anthropics/
          else
            cp -r "$tmp/." skills/upstream/anthropics/
          fi
          (cd "$tmp" && git rev-parse HEAD) > skills/upstream/anthropics/.upstream_sha

      - name: Pull VoltAgent/awesome-agent-skills
        continue-on-error: true
        run: |
          tmp="$(mktemp -d)"
          git clone --depth 1 https://github.com/VoltAgent/awesome-agent-skills "$tmp" || exit 0
          rm -rf skills/upstream/voltagent
          mkdir -p skills/upstream/voltagent
          cp -r "$tmp/." skills/upstream/voltagent/
          (cd "$tmp" && git rev-parse HEAD) > skills/upstream/voltagent/.upstream_sha

      - name: Open PR if changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(skills): upstream sync"
          title: "chore(skills): upstream sync ${{ github.run_id }}"
          body: |
            Automated weekly sync of upstream skill repositories.

            - `skills/upstream/anthropics/` <- anthropics/skills
            - `skills/upstream/voltagent/`  <- VoltAgent/awesome-agent-skills

            Review the diff and adopt anything useful into a real
            `skills/<domain>/<skill_id>/` folder. Do not merge upstream
            content into a production domain without a maintainer review.
          branch: chore/skills-upstream-sync
          delete-branch: true