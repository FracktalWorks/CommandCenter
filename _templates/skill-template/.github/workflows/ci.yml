name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install package + dev extras
        run: uv pip install -e ".[dev]"

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  lint:
    name: ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dev extras
        run: uv pip install -e ".[dev]"

      - name: Lint
        run: uv run ruff check .

  evals:
    name: promptfoo evals
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test
    env:
      LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
      LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Run evals
        run: promptfoo eval -c evals/promptfoo.yaml --ci

      - name: Post eval results as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.existsSync('promptfoo_results.json')
              ? JSON.parse(fs.readFileSync('promptfoo_results.json', 'utf8'))
              : null;
            const body = results
              ? `### Eval Results\n\`\`\`json\n${JSON.stringify(results.summary, null, 2)}\n\`\`\``
              : '### Eval Results\nNo results file found.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
